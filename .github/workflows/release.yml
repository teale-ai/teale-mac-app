name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          # Use the same YYYY.MM.DD.HHMM format as internal builds
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v$(date -u '+%Y.%m.%d.%H%M')"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build app bundle
        run: ./bundle.sh

      - name: Build CLI binary
        run: |
          swift build -c release --product teale
          cp .build/release/teale .build/teale-macos-arm64
          strip .build/teale-macos-arm64

      - name: Package artifacts
        run: |
          cd .build
          ditto -c -k --keepParent Teale.app Teale.zip
          shasum -a 256 Teale.zip > checksums.txt
          shasum -a 256 teale-macos-arm64 >> checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "Teale $TAG" \
            --notes "$(cat <<'EOF'
          ## Install

          **One command:**
          ```
          curl -fsSL https://teale.com/install.sh | sh
          ```

          Or using the raw GitHub URL:
          ```
          curl -fsSL https://raw.githubusercontent.com/taylorhou/teale-mac-app/main/scripts/install.sh | sh
          ```

          Requires macOS 14 Sonoma or later. Apple Silicon only.
          EOF
          )" \
            .build/Teale.zip \
            .build/teale-macos-arm64 \
            .build/checksums.txt
